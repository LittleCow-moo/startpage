<meta charset="utf8">
<script>
  var cowstart = {
    process:function (thing){
      if (thing==(null||'')) return
      if (thing.startsWith('http://') || thing.startsWith('https://')){
        cowstart.go(thing)
      } else {
        cowstart.go('https://cse.google.com/cse?cx=867941d9b887aa2d2&q='+thing)
      }},
      go:function (thing){
        location.href=thing
      },
    change:function (thing){
      if (thing.startsWith('http://') || thing.startsWith('https://')){
       document.getElementById('go').innerHTML='🐮🌐'
      } else {
        document.getElementById('go').innerHTML='🐮🔎'
      }
      if (thing==(null||'')){
        document.getElementById('go').innerHTML='🐮'
      }
    },
  }
</script>
